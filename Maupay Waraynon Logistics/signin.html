<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maupay Waraynon Padala Center | Sign In</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="Maupay Waraynon Logo" class="header-logo-img">
            <div class="logo-text">
                <h2>MAUPAY WARAYNON</h2>
                <span>Bacoor</span>
            </div>
        </div>
        
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
        </label>

        <nav>
            <a href="home.html">HOME</a>
            <a href="home.html#services">SERVICES</a>
            <a href="home.html#about">ABOUT US</a>
            <a href="home.html#tracking">TRACK BY</a>
            <a href="#" class="btn-quote">GET QUOTE</a>
            <a href="signin.html" class="btn-signin">SIGN IN</a>
        </nav>
    </header>

    <main class="portal-container">
        <div class="portal-wrapper">
            
            <section class="login-card">
                <span class="portal-sub">USER PORTAL</span>
                <h1>Sign In</h1>
                <p class="portal-desc">Enter your credentials to access your shipment dashboard.</p>
                
                <form id="login-form" class="signin-form">
                    <div id="auth-notification" class="auth-notification hidden"></div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@gmail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="***************" required>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember Me</span>
                        </label>
                        <a href="forgot.html" class="forgot-password-link">Forgot Password</a>
                    </div>
                    
                    <button type="submit" class="btn-submit-login">Sign In To My Account</button>
                    
                    <div class="divider">
                        <span>or continue with</span>
                    </div>
                    
                    <button type="button" class="btn-google-login">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-icon">
                        Sign in with Google
                    </button>
                    
                    <p class="signup-redirect">Don't have an account? <a href="signup.html">Create one free</a></p>
                </form>
            </section>
            
            <section class="portal-graphic">
                <img src="images/bglogin.png" alt="Delivery Rider Logistics Service Graphic" class="rider-img">
            </section>

        </div>
    </main>

    <script src="signin.js"></script>
</body>
</html>
