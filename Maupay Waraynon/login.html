<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Maupay Waraynon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- NAVBAR-->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-truck-moving"></i>
                <div class="logo-text">MAUPAY WARAYNON <span class="logo-sub">Bacoor</span></div>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-item">Home</a>
                <a href="booking.html" class="nav-item">Booking</a>
                <a href="#" class="nav-item">About Us</a>
                <a href="#" class="nav-item">Contact</a>
                <a href="#" class="btn btn-quote">Get Quote</a>
                <a href="login.html" class="btn btn-signin">Sign In</a>
            </div>
        </div>
    </nav>

    <!-- MAIN SIGN IN Layout -->
    <main class="login-wrapper">
        <div class="login-split-container">
            
            <!-- LEFT PANEL:Sign In Form-->
            <div class="login-card">
                <p class="portal-tag">USER PORTAL</p>
                <h1 class="portal-title">SIGN IN</h1>
                <p class="portal-subtitle">Enter your credentials to access your shipment dashboard</p>

                <form class="login-form" action="user-home.html" method="GET">
                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="name@example.com"
                            required 
                            class="form-input"
                        >
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="password"
                            minlength="8" 
                            required 
                            class="form-input"
                        >
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Remember Me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password</a>
                    </div>

                    <!--Submit Button -->
                    <button type="submit" class="btn-submit">Sign In To My Account</button>

                    <!-- OR -->
                    <div class="divider">
                        <span>Or Continue with</span>
                    </div>

                    <!-- Google Sign-In-->
                    <button type="button" class="btn-google">
                        <i class="fab fa-google"></i> Sign In with GOOGLE
                    </button>

                    <!-- Account Registration Link -->
                    <p class="signup-text">Dont have ann account? <a href="register.html">Create one Free</a></p>
                </form>
            </div>

            <!-- RIGHT PANEL: IAMGE -->
            <div class="login-graphic-box">
                
                <img src="image_2a3a33.png" alt="IMAGE" class="graphic-img">
            </div>

        </div>
    </main>

</body>
</html>
